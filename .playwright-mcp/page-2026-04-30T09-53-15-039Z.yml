  - generic [ref=e169]:
    - generic [ref=e170]:
      - generic [ref=e171]: Specialty Service
      - heading "Calcium scaling removed without draining." [level=2] [ref=e172]:
        - text: Calcium scaling
        - text: removed without
        - emphasis [ref=e173]: draining.
      - paragraph [ref=e174]: "Austin pulls from limestone aquifers — water that's naturally high in calcium. Over time it precipitates at the waterline: white crusty deposits that don't respond to standard pool chemicals."
      - paragraph [ref=e175]: Left alone, calcium etches tile grout, stains plaster, and builds up inside equipment — cutting heater efficiency and shortening pump life. We remove it using targeted descaling protocols appropriate to your surface type.
      - paragraph [ref=e176]: Most waterline tile deposits can be treated in-water. No full drain required in the majority of cases.
      - link "Get a Calcium Assessment →" [ref=e177] [cursor=pointer]:
        - /url: "#contact"
    - generic [ref=e178]:
      - generic [ref=e179]: FAQ
      - heading "Common questions." [level=3] [ref=e180]
      - generic [ref=e181]:
        - paragraph [ref=e182] [cursor=pointer]: Do I need to drain my pool?
        - paragraph [ref=e183]: Not in most cases. Waterline tile deposits are typically treated in-water. Heavily scaled plaster or submerged surfaces may require a partial drain — we assess and tell you honestly before any work begins.
      - generic [ref=e184]:
        - paragraph [ref=e185] [cursor=pointer]: How long does it take?
        - paragraph [ref=e186]: Waterline tile on a typical residential pool takes 2–4 hours. More extensive treatments may require a follow-up visit.
      - generic [ref=e187]:
        - paragraph [ref=e188] [cursor=pointer]: Will it come back?
        - paragraph [ref=e189]: Calcium will return if underlying water chemistry isn't managed. After removal we walk you through the chemical targets — saturation index, calcium hardness — to slow re-accumulation significantly.
      - generic [ref=e190]:
        - paragraph [ref=e191] [cursor=pointer]: Can it damage equipment?
        - paragraph [ref=e192]: Yes. Calcium scale inside heater heat exchangers and pump impellers reduces efficiency and accelerates wear. If your tile shows scaling, your equipment is likely affected too. We check both.
